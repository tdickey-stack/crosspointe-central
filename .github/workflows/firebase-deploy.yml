name: Deploy Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-live-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Restore generated YouVersion bundle
        run: pnpm run build:youversion

      - name: Verify JavaScript syntax
        run: pnpm run check:syntax

      - name: Write Functions environment file
        env:
          FIREBASE_FUNCTIONS_ENV: ${{ secrets.FIREBASE_FUNCTIONS_ENV }}
        run: printf '%s' "$FIREBASE_FUNCTIONS_ENV" > functions/.env

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CROSSPOINTE_CENTRAL }}

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Deploy live Firebase project
        run: firebase deploy --project crosspointe-central --only hosting,functions,firestore --non-interactive
